apiVersion: apps/v1
kind: Deployment
metadata:
  name:  photo-studio-deployment
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:  1
      maxUnavailable:  0
  selector:
    matchLabels:
      app: photo-studio
  template:
    metadata:
      labels:
        app: photo-studio
    spec:
      containers:
        - name: photo-studio
          image: iyask/photo-app:v1.1.0
          resources:
            requests:
              memory:  "150Mi"
              cpu:  "100m"
            limits:
              memory:  "300Mi"
              cpu:  "250m"

          envFrom:
            - configMapRef:
                name: photo-studio-config
          ports:
            - containerPort: 3000